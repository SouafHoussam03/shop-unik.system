<!DOCTYPE html>
<html lang="fr">

<head>

  <!-- ================= META ================= -->
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="theme-color"
    content="#dc2626"
  />

  <meta
    name="robots"
    content="index, follow"
  />

  <!-- ================= SEO ================= -->
  <title>
    UNIK SYSTEM | Revêtements, Décoration & Solutions Digitales au Maroc
  </title>

  <meta
    name="description"
    content="UNIK SYSTEM est votre spécialiste au Maroc en revêtements muraux, décoration intérieure, papier peint, impression HD, ecommerce et solutions digitales modernes."
  />

  <meta
    name="keywords"
    content="UNIK SYSTEM, revêtement mural Maroc, papier peint Maroc, décoration intérieure, ecommerce Maroc, impression HD, design mural, Settat"
  />

  <meta
    name="author"
    content="UNIK SYSTEM"
  />

  <!-- ================= FAVICON ================= -->
  <link
    rel="icon"
    type="image/png"
    href="./logo.png"
  />

  <link
    rel="apple-touch-icon"
    href="./logo.png"
  />

  <!-- ================= OPEN GRAPH ================= -->
  <meta
    property="og:title"
    content="UNIK SYSTEM | Revêtements & Solutions Digitales"
  />

  <meta
    property="og:description"
    content="Découvrez les meilleurs revêtements muraux, décorations modernes et solutions digitales au Maroc avec UNIK SYSTEM."
  />

  <meta
    property="og:image"
    content="%PUBLIC_URL%/banner.jpg"
  />

  <meta
    property="og:url"
    content="https://unik-system.com"
  />

  <meta
    property="og:type"
    content="website"
  />

  <!-- ================= TWITTER SEO ================= -->
  <meta
    name="twitter:card"
    content="summary_large_image"
  />

  <meta
    name="twitter:title"
    content="UNIK SYSTEM"
  />

  <meta
    name="twitter:description"
    content="Revêtements muraux, décoration moderne et solutions digitales au Maroc."
  />

  <meta
    name="twitter:image"
    content="%PUBLIC_URL%/banner.jpg"
  />

  <!-- ================= GOOGLE FONTS ================= -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  />

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  />

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />

  <!-- ================= MANIFEST ================= -->
  <link
    rel="manifest"
    href="%PUBLIC_URL%/manifest.json"
  />

</head>

<body>

  <noscript>
    You need to enable JavaScript to run this app.
  </noscript>

  <div id="root"></div>

</body>

</html>
